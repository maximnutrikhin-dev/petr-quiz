<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Petr's World Cup Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#050a07;color:#fff;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
.bebas{font-family:'Bebas Neue',sans-serif}
.barlow{font-family:'Barlow Condensed',sans-serif}
.prog-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.08)}
.crest-card{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all 0.18s}
.crest-card:hover{background:rgba(255,255,255,0.08)}
.crest-card.correct{background:rgba(0,212,170,0.1);border-color:#00d4aa}
.crest-card.wrong{background:rgba(255,107,107,0.1);border-color:#ff6b6b}
.crest-img{width:76px;height:76px;object-fit:contain;background:#fff;border-radius:6px;padding:4px}
.flag-img{width:110px;height:74px;object-fit:cover;border-radius:6px;border:1px solid rgba(255,255,255,0.2)}
.answer-btn{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 16px;text-align:left;width:100%;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:600;color:#fff;transition:all 0.18s;display:flex;align-items:center;justify-content:space-between}
.answer-btn:hover{background:rgba(255,255,255,0.08)}
.answer-btn.correct{background:rgba(0,212,170,0.1);border-color:#00d4aa;color:#00d4aa}
.answer-btn.wrong{background:rgba(255,107,107,0.1);border-color:#ff6b6b}
.answer-btn.eliminated{opacity:0.2;pointer-events:none}
.player-card{display:flex;border-radius:14px;overflow:hidden;border:2px solid rgba(255,215,0,0.3);background:#111;margin-bottom:16px}
.player-photo{width:120px;flex-shrink:0;object-fit:cover;object-position:top;height:160px}
.player-hints{flex:1;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px;align-content:start}
.hint-box{background:rgba(255,255,255,0.05);border-radius:8px;padding:6px 8px}
.hint-label{font-size:0.6rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;font-family:'Barlow Condensed',sans-serif}
.hint-val{font-size:0.82rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;line-height:1.2}
.feedback{padding:14px 16px;border-radius:12px;margin-bottom:14px}
.feedback.correct{background:rgba(0,212,170,0.09);border:1px solid rgba(0,212,170,0.3)}
.feedback.wrong{background:rgba(255,107,107,0.07);border:1px solid rgba(255,107,107,0.3)}
.feedback-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.04em;margin-bottom:6px}
.feedback.correct .feedback-title{color:#00d4aa}
.feedback.wrong .feedback-title{color:#ff6b6b}
.feedback-fact{font-size:0.83rem;color:#cbd5e1;line-height:1.45}
.new-card-badge{margin-top:10px;padding:7px 12px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;font-weight:700}
.world-card{border-radius:16px;padding:20px;cursor:pointer;transition:all 0.2s;margin-bottom:14px;border:1px solid transparent}
.world-card:hover{transform:translateX(5px)}
.main-btn{font-family:'Bebas Neue',sans-serif;letter-spacing:0.06em;border-radius:10px;border:2px solid;padding:13px 28px;font-size:1.05rem;transition:all 0.15s}
.main-btn:hover{transform:scale(1.03)}
.world-icon{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 4px;cursor:pointer;text-align:center;transition:background 0.2s}
.world-icon:hover{background:rgba(255,255,255,0.1)}
.diff-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.06em;margin-bottom:14px}
.gallery-card{border-radius:12px;padding:14px 10px;text-align:center}
.loading-spinner{display:inline-block;animation:spin 1s linear infinite;font-size:1.2rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active" style="align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden">
  <svg style="position:fixed;inset:0;width:100%;height:100%;opacity:0.05;pointer-events:none"><circle cx="50%" cy="50%" r="180" fill="none" stroke="#00d4aa" stroke-width="2"/><line x1="50%" y1="0" x2="50%" y2="100%" stroke="#00d4aa" stroke-width="1.5"/><rect x="8%" y="18%" width="84%" height="64%" fill="none" stroke="#00d4aa" stroke-width="1.5" rx="4"/></svg>
  <div style="position:relative;z-index:1;text-align:center;max-width:520px;width:100%">
    <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
      <button onclick="toggleLang()" id="lang-btn" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#fff;padding:6px 14px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem">🇷🇺 RU</button>
    </div>
    <div style="font-size:3.5rem;margin-bottom:4px">⚽</div>
    <h1 class="bebas" style="font-size:clamp(3rem,11vw,5.5rem);letter-spacing:0.04em;line-height:0.9;background:linear-gradient(135deg,#00d4aa 0%,#ffd700 50%,#ff6b6b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent" id="home-title">PETR'S</h1>
    <h2 class="bebas" id="home-subtitle" style="font-size:clamp(2rem,7vw,3.5rem);letter-spacing:0.08em;color:#ffd700;margin-bottom:6px">WORLD CUP QUIZ</h2>
    <p class="barlow" id="home-desc" style="color:#9ca3af;font-size:0.95rem;margin-bottom:28px">4 worlds · 60 questions · Collect all cards</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:28px">
      <button class="main-btn" onclick="showScreen('worlds')" style="background:#00d4aa;color:#000;border-color:#00d4aa">⚽ <span id="btn-play">PLAY</span></button>
      <button class="main-btn" onclick="showScreen('gallery')" style="background:rgba(255,215,0,0.1);color:#ffd700;border-color:#ffd700">📦 <span id="btn-cards">CARDS</span> (<span id="home-card-count">0</span>/60)</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px" id="home-worlds"></div>
  </div>
</div>

<!-- WORLDS -->
<div id="screen-worlds" class="screen" style="padding:1.5rem 1rem">
  <div style="max-width:520px;margin:0 auto;width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
      <button onclick="showScreen('home')" style="background:none;border:none;color:#9ca3af;font-family:'Barlow Condensed',sans-serif;font-size:1rem">← <span id="back-worlds">Back</span></button>
      <button onclick="toggleLang()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#fff;padding:4px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.75rem" id="lang-btn-worlds">🇷🇺 RU</button>
    </div>
    <h2 class="bebas" id="worlds-title" style="font-size:2.5rem;letter-spacing:0.05em;color:#ffd700;margin-bottom:18px">CHOOSE YOUR WORLD</h2>
    <div id="worlds-list"></div>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen" style="padding:1.5rem 1rem">
  <div style="max-width:520px;margin:0 auto;width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <button onclick="showScreen('worlds')" style="background:none;border:none;color:#9ca3af;font-family:'Barlow Condensed',sans-serif;font-size:0.9rem">← <span id="back-quiz">Worlds</span></button>
      <span class="bebas" style="font-size:1.15rem" id="quiz-world-title"></span>
      <button onclick="toggleLang()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#fff;padding:3px 8px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.72rem" id="lang-btn-quiz">🇷🇺 RU</button>
    </div>
    <div id="quiz-progress" style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap"></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px;font-family:'Barlow Condensed',sans-serif;font-size:0.88rem">
      <span style="color:#9ca3af" id="quiz-qnum"></span>
      <span style="font-weight:700" id="quiz-score"></span>
    </div>
    <div id="quiz-diff-badge" class="diff-badge"></div>
    <div id="quiz-question" style="font-family:'Barlow Condensed',sans-serif;font-size:clamp(1rem,3.5vw,1.25rem);font-weight:700;margin-bottom:18px;line-height:1.4;color:#f0f0f0"></div>
    <div id="quiz-player-card"></div>
    <div id="quiz-options"></div>
    <button id="ask-dad-btn" onclick="askDad()" style="width:100%;border-radius:8px;padding:8px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.88rem;margin-bottom:14px;background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.33);color:#fbbf24"></button>
    <div id="quiz-feedback"></div>
    <button id="quiz-next-btn" onclick="nextQuestion()" style="display:none;width:100%;border:2px solid;border-radius:10px;padding:13px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:0.06em;color:#000"></button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen" style="align-items:center;justify-content:center;padding:2rem 1rem">
  <div style="max-width:460px;width:100%;text-align:center">
    <h1 class="bebas" id="result-title" style="font-size:2.8rem;letter-spacing:0.06em;margin-bottom:4px"></h1>
    <div class="bebas" id="result-score" style="font-size:5rem;color:#fff;line-height:1"></div>
    <div class="barlow" id="result-sub" style="color:#9ca3af;margin-bottom:32px"></div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <button class="main-btn" onclick="replayWorld()" id="result-replay" style="width:100%"></button>
      <button class="main-btn" onclick="showScreen('gallery')" id="result-gallery" style="background:rgba(255,215,0,0.1);color:#ffd700;border-color:#ffd700;width:100%">📦 MY CARDS</button>
      <button class="main-btn" onclick="showScreen('home')" id="result-home" style="background:rgba(107,114,128,0.1);color:#9ca3af;border-color:#6b7280;width:100%">🏠 HOME</button>
    </div>
  </div>
</div>

<!-- GALLERY -->
<div id="screen-gallery" class="screen" style="padding:1.5rem 1rem">
  <div style="max-width:520px;margin:0 auto;width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <button onclick="showScreen('home')" style="background:none;border:none;color:#9ca3af;font-family:'Barlow Condensed',sans-serif;font-size:1rem">← <span id="back-gallery">Back</span></button>
      <button onclick="toggleLang()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#fff;padding:4px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.75rem" id="lang-btn-gallery">🇷🇺 RU</button>
    </div>
    <h2 class="bebas" id="gallery-title" style="font-size:2.3rem;color:#ffd700;margin-bottom:6px">CARD COLLECTION</h2>
    <p class="barlow" id="gallery-count" style="color:#9ca3af;margin-bottom:18px;font-size:0.88rem"></p>
    <div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap" id="gallery-filters"></div>
    <div id="gallery-grid"></div>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "en";
let currentWorld = null;
let qIdx = 0;
let score = 0;
let selected = false;
let dadUsed = false;
let eliminated = [];
let collectedCards = JSON.parse(localStorage.getItem("petr-cards-v2") || "[]");
const TOTAL_Q = WORLDS.reduce((s,w)=>s+w.questions.length,0);

function saveCards() { localStorage.setItem("petr-cards-v2", JSON.stringify(collectedCards)); }
function t(en, ru) { return lang === "ru" ? ru : en; }

// ── INIT ──────────────────────────────────────────────────────────────────────
window.onload = async () => {
  renderHome();
  // Load badges in background
  await loadBadges();
  // Re-render if on quiz screen showing crests
  if (currentWorld?.id === 'clubs' && document.getElementById('screen-quiz').classList.contains('active')) {
    renderQuestion();
  }
};

// ── SCREENS ───────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  const el = document.getElementById("screen-" + name);
  el.classList.add("active");
  if (name === "home")    renderHome();
  if (name === "worlds")  renderWorlds();
  if (name === "gallery") renderGallery();
}

function toggleLang() {
  lang = lang === "en" ? "ru" : "en";
  const btnLabel = lang === "en" ? "🇷🇺 RU" : "🇬🇧 EN";
  document.querySelectorAll("[id^='lang-btn']").forEach(b => b.textContent = btnLabel);
  const active = document.querySelector(".screen.active");
  if (active) {
    const id = active.id.replace("screen-","");
    if (id==="home") renderHome();
    else if (id==="worlds") renderWorlds();
    else if (id==="quiz") renderQuestion();
    else if (id==="gallery") renderGallery();
  }
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome() {
  document.getElementById("home-title").textContent = t("PETR'S","ИГРА");
  document.getElementById("home-subtitle").textContent = t("WORLD CUP QUIZ","ПЕТРА");
  document.getElementById("home-desc").textContent = t(`4 worlds · ${TOTAL_Q} questions · Collect all cards`,`4 мира · ${TOTAL_Q} вопросов · Собери все карточки`);
  document.getElementById("btn-play").textContent = t("PLAY","ИГРАТЬ");
  document.getElementById("btn-cards").textContent = t("CARDS","КАРТОЧКИ");
  document.getElementById("home-card-count").textContent = collectedCards.length;
  document.getElementById("home-worlds").innerHTML = WORLDS.map(w=>`
    <div class="world-icon" onclick="startWorld('${w.id}')" style="border:1px solid ${w.color}33">
      <div style="font-size:1.5rem">${w.emoji}</div>
      <div class="barlow" style="font-size:0.68rem;color:${w.color};font-weight:700;margin-top:4px;line-height:1.2">${t(w.name,w.nameRu)}</div>
    </div>`).join("");
}

// ── WORLDS ────────────────────────────────────────────────────────────────────
function renderWorlds() {
  document.getElementById("worlds-title").textContent = t("CHOOSE YOUR WORLD","ВЫБЕРИ МИР");
  document.getElementById("back-worlds").textContent = t("Back","Назад");
  document.getElementById("worlds-list").innerHTML = WORLDS.map(w=>{
    const earned = collectedCards.filter(c=>c.world===w.id).length;
    const pct = (earned/w.questions.length)*100;
    return `<div class="world-card" onclick="startWorld('${w.id}')" style="background:${w.bg};border-color:${w.color}44"
      onmouseover="this.style.boxShadow='0 0 28px ${w.color}22'" onmouseout="this.style.boxShadow='none'">
      <div style="display:flex;align-items:center;gap:16px">
        <div style="font-size:2.2rem">${w.emoji}</div>
        <div style="flex:1">
          <div class="bebas" style="font-size:1.45rem;color:${w.color}">${t(w.name,w.nameRu)}</div>
          <div class="barlow" style="color:#9ca3af;font-size:0.8rem">${t(w.desc,w.descRu)}</div>
        </div>
        <div style="text-align:right">
          <div class="bebas" style="font-size:1.5rem;color:#ffd700">${earned}/${w.questions.length}</div>
          <div style="font-size:0.65rem;color:#6b7280">${t("cards","карт")}</div>
        </div>
      </div>
      <div style="margin-top:10px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px">
        <div style="height:100%;background:${w.color};border-radius:2px;width:${pct}%;transition:width 0.5s"></div>
      </div>
    </div>`;
  }).join("");
}

// ── QUIZ ──────────────────────────────────────────────────────────────────────
function startWorld(id) {
  currentWorld = WORLDS.find(w=>w.id===id);
  qIdx=0; score=0; selected=false; dadUsed=false; eliminated=[];
  showScreen("quiz");
  renderQuestion();
}

function renderQuestion() {
  if (!currentWorld) return;
  const w = currentWorld;
  const q = w.questions[qIdx];
  document.getElementById("screen-quiz").style.background = w.bg;
  document.getElementById("quiz-world-title").textContent = `${w.emoji} ${t(w.name,w.nameRu)}`;
  document.getElementById("quiz-world-title").style.color = w.color;
  document.getElementById("back-quiz").textContent = t("Worlds","Миры");

  // Progress
  document.getElementById("quiz-progress").innerHTML = w.questions.map((_,i)=>
    `<div class="prog-dot" style="background:${i<qIdx?w.color:i===qIdx?w.color+'66':'rgba(255,255,255,0.08)'}"></div>`
  ).join("");

  document.getElementById("quiz-qnum").textContent = t(`Q${qIdx+1} of ${w.questions.length}`,`В${qIdx+1} из ${w.questions.length}`);
  document.getElementById("quiz-score").textContent = `⚽ ${score}`;
  document.getElementById("quiz-score").style.color = w.color;

  const db = document.getElementById("quiz-diff-badge");
  db.textContent = t(q.diff.toUpperCase(), DR[q.diff].toUpperCase());
  db.style.cssText += `;background:${DC[q.diff]}15;border:1px solid ${DC[q.diff]}44;color:${DC[q.diff]}`;

  document.getElementById("quiz-question").textContent = t(q.en, q.ru);

  // Player photo card
  const pc = document.getElementById("quiz-player-card");
  if (q.type === "player") {
    const photo = PLAYER_URLS[q.playerKey] || "";
    const hints = Object.entries(q.hint).map(([k,v])=>`
      <div class="hint-box"><div class="hint-label">${k}</div><div class="hint-val">${v}</div></div>`).join("");
    pc.innerHTML = `<div class="player-card" style="border-color:${w.color}44">
      <img src="${photo}" class="player-photo" alt="" onerror="this.style.display='none'"/>
      <div class="player-hints">${hints}</div>
    </div>`;
  } else {
    pc.innerHTML = "";
  }

  // Options
  const optsEl = document.getElementById("quiz-options");
  if (q.type === "crest") {
    optsEl.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px";
    optsEl.innerHTML = q.opts.map((o,i)=>{
      const imgSrc = BADGE_URLS[o.key] || "";
      
        const imgHtml = imgSrc
          ? `<img src="${imgSrc}" class="crest-img" alt="${o.label}" onerror="this.parentElement.innerHTML='<div style=\\'font-size:2rem;padding:20px\\'>🛡️</div>'">`
          : `<div style="font-size:2rem;padding:20px;background:#f5f5f5;border-radius:6px;display:flex;align-items:center;justify-content:center"><span class="loading-spinner">⚽</span></div>`;
        return `<div class="crest-card" id="opt-${i}" onclick="pickAnswer(${i})" style="border-color:${w.color}33">
          ${imgHtml}
          <div class="barlow" style="font-size:0.78rem;font-weight:700;text-align:center">${o.label}</div>
        </div>`;
      }).join("");
    } else if (q.type === "flag") {
      optsEl.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px";
      pc.innerHTML = `<div style="text-align:center;margin-bottom:14px;background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,0.1)">
        <img src="${flagUrl(q.flagCode)}" style="width:200px;height:133px;object-fit:cover;border-radius:8px;border:2px solid rgba(255,255,255,0.2)" alt="flag" onerror="this.parentElement.innerHTML='<div style=\\'font-size:4rem\\'>🏳️</div>'"/>
      </div>`;
      optsEl.innerHTML = q.opts.map((o,i)=>`
        <button class="answer-btn" id="opt-${i}" onclick="pickAnswer(${i})" style="border-color:${w.color}33">
          ${t(o.en,o.ru)}
        </button>`).join("");
    } else {
      optsEl.style.cssText = "display:flex;flex-direction:column;gap:8px;margin-bottom:16px";
      optsEl.innerHTML = q.opts.map((o,i)=>`
        <button class="answer-btn" id="opt-${i}" onclick="pickAnswer(${i})" style="border-color:${w.color}33">
          ${t(o.en,o.ru)}
        </button>`).join("");
    }

    const dad = document.getElementById("ask-dad-btn");
    dad.style.display = "block";
    dad.disabled = dadUsed;
    dad.style.opacity = dadUsed ? "0.5" : "1";
    dad.textContent = dadUsed ? t("✅ Ask Dad used","✅ Помощь папы использована") : t("🆘 Ask Dad — removes 2 wrong answers","🆘 Спроси папу — убрать 2 неверных ответа");

    document.getElementById("quiz-feedback").innerHTML = "";
    const nb = document.getElementById("quiz-next-btn");
    nb.style.display = "none";
    nb.style.background = w.color;
    nb.style.borderColor = w.color;

    selected = false;
    eliminated = [];
  }

  function pickAnswer(idx) {
    if (selected) return;
    selected = true;
    const w = currentWorld;
    const q = w.questions[qIdx];
    const isCorrect = q.opts[idx].correct;

    q.opts.forEach((o,i) => {
      const el = document.getElementById("opt-"+i);
      if (!el) return;
      if (o.correct) el.classList.add("correct");
      else if (i===idx && !o.correct) el.classList.add("wrong");
      el.onclick = null;
    });

    if (isCorrect) {
      score++;
      if (!collectedCards.find(c=>c.id===q.id)) {
        collectedCards.push({id:q.id,name:q.cardName,emoji:q.cardEmoji,rarity:q.rarity,world:w.id});
        saveCards();
      }
    }

    const r = RARITY[q.rarity];
    const newCardHtml = isCorrect ? `<div class="new-card-badge" style="background:${r.color}12;border:1px solid ${r.color}44;color:${r.color}">${q.cardEmoji} ${t("New card: "+q.cardName,"Карточка: "+q.cardName)} · ${t(r.label,r.labelRu)}</div>` : "";

    document.getElementById("quiz-feedback").innerHTML = `
      <div class="feedback ${isCorrect?"correct":"wrong"}">
        <div class="feedback-title">${isCorrect?t("⚽ CORRECT!","⚽ ПРАВИЛЬНО!"):t("❌ WRONG!","❌ НЕВЕРНО!")}</div>
        <div class="feedback-fact">💡 ${t(q.fact,q.factRu)}</div>
        ${newCardHtml}
      </div>`;

    const nb = document.getElementById("quiz-next-btn");
    nb.style.display = "block";
    nb.textContent = qIdx+1>=w.questions.length ? t("🏆 SEE RESULTS","🏆 РЕЗУЛЬТАТЫ") : t("NEXT →","ДАЛЬШЕ →");
    document.getElementById("ask-dad-btn").style.display = "none";
  }

  function askDad() {
    if (dadUsed || selected) return;
    dadUsed = true;
    const q = currentWorld.questions[qIdx];
    const wrongs = q.opts.map((o,i)=>o.correct?-1:i).filter(i=>i>=0);
    wrongs.sort(()=>Math.random()-.5).slice(0,2).forEach(i=>{
      const el = document.getElementById("opt-"+i);
      if (el) { el.classList.add("eliminated"); el.onclick=null; }
    });
    const btn = document.getElementById("ask-dad-btn");
    btn.textContent = t("✅ Ask Dad used","✅ Помощь папы использована");
    btn.disabled = true; btn.style.opacity="0.5";
  }

  function nextQuestion() {
    qIdx++;
    if (qIdx >= currentWorld.questions.length) showResult();
    else renderQuestion();
  }

  function showResult() {
    const total = currentWorld.questions.length;
    const pct = Math.round((score/total)*100);
    const g = pct>=80?{en:"CHAMPION! 🏆",ru:"ЧЕМПИОН! 🏆",c:"#ffd700"}
             : pct>=60?{en:"GREAT GAME! ⭐",ru:"ОТЛИЧНАЯ ИГРА! ⭐",c:"#00d4aa"}
             : {en:"KEEP TRAINING! 💪",ru:"ТРЕНИРУЙСЯ! 💪",c:"#ff6b6b"};
    document.getElementById("screen-result").style.background = currentWorld.bg;
    document.getElementById("result-title").textContent = t(g.en,g.ru);
    document.getElementById("result-title").style.color = g.c;
    document.getElementById("result-score").innerHTML = `${score}<span style="color:${currentWorld.color}">/${total}</span>`;
    document.getElementById("result-sub").textContent = `${t(currentWorld.name,currentWorld.nameRu)} · ${pct}%`;
    const rb = document.getElementById("result-replay");
    rb.textContent = t("🔄 PLAY AGAIN","🔄 СНОВА");
    rb.style.background = currentWorld.color;
    rb.style.borderColor = currentWorld.color;
    document.getElementById("result-gallery").textContent = t(`📦 MY CARDS (${collectedCards.length})`,`📦 МОИ КАРТОЧКИ (${collectedCards.length})`);
    document.getElementById("result-home").textContent = t("🏠 HOME","🏠 ГЛАВНАЯ");
    showScreen("result");
    document.getElementById("screen-result").style.display = "flex";
  }

  function replayWorld() { startWorld(currentWorld.id); }

  let galleryFilter = "all";
  function setGalleryFilter(id) { galleryFilter=id; renderGallery(); }

  function renderGallery() {
    document.getElementById("gallery-title").textContent = t("CARD COLLECTION","КОЛЛЕКЦИЯ");
    document.getElementById("back-gallery").textContent = t("Back","Назад");
    document.getElementById("gallery-count").textContent = t(`${collectedCards.length} of ${TOTAL_Q} collected`,`${collectedCards.length} из ${TOTAL_Q} собрано`);
    const filters = [{id:"all",label:t("All","Все")},...WORLDS.map(w=>({id:w.id,label:w.emoji+" "+t(w.name,w.nameRu)}))];
    document.getElementById("gallery-filters").innerHTML = filters.map(f=>`
      <button onclick="setGalleryFilter('${f.id}')" style="background:${galleryFilter===f.id?"rgba(255,215,0,0.1)":"rgba(255,255,255,0.04)"};border:1px solid ${galleryFilter===f.id?"#ffd700":"#374151"};color:${galleryFilter===f.id?"#ffd700":"#9ca3af"};padding:5px 12px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:600">
        ${f.label}
      </button>`).join("");

    const shown = galleryFilter==="all" ? collectedCards : collectedCards.filter(c=>c.world===galleryFilter);
    const grid = document.getElementById("gallery-grid");
    if (!shown.length) {
      grid.innerHTML = `<div style="text-align:center;padding:3rem;color:#6b7280;font-family:'Barlow Condensed',sans-serif"><div style="font-size:2.5rem;margin-bottom:8px">📭</div>${t("Answer correctly to collect cards!","Отвечай правильно — собирай карточки!")}</div>`;
      return;
    }
    grid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px";
    grid.innerHTML = shown.map(card=>{
      const r = RARITY[card.rarity];
      const w = WORLDS.find(x=>x.id===card.world);
      return `<div class="gallery-card" style="background:linear-gradient(135deg,#0d0d0d,${r.color}15);border:2px solid ${r.color}44;box-shadow:0 0 12px ${r.color}22">
        <div style="font-size:1.8rem;margin-bottom:4px">${card.emoji}</div>
        <div class="barlow" style="font-weight:700;font-size:0.78rem;margin-bottom:3px;line-height:1.2">${card.name}</div>
        <div style="color:${r.color};font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em">${t(r.label,r.labelRu)}</div>
        ${w?`<div style="color:#6b7280;font-size:0.58rem;margin-top:3px">${w.emoji}</div>`:""}
      </div>`;
    }).join("");
  }
</script>
</body>
</html>
