<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Petr's World Cup Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#050a07;color:#fff;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
.bebas{font-family:'Bebas Neue',sans-serif}
.barlow{font-family:'Barlow Condensed',sans-serif}
.crest-card{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.18s}
.crest-card:hover{background:rgba(255,255,255,0.08)}
.crest-card.correct{background:rgba(0,212,170,0.1);border-color:#00d4aa}
.crest-card.wrong{background:rgba(255,107,107,0.1);border-color:#ff6b6b}
.crest-img{width:70px;height:70px;object-fit:contain;background:#fff;border-radius:6px;padding:3px}
.answer-btn{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:10px;padding:13px 16px;text-align:left;width:100%;font-family:'Barlow Condensed',sans-serif;font-size:0.98rem;font-weight:600;color:#fff;transition:all 0.18s;display:flex;align-items:center;justify-content:space-between}
.answer-btn:hover{background:rgba(255,255,255,0.08)}
.answer-btn.correct{background:rgba(0,212,170,0.1);border-color:#00d4aa;color:#00d4aa}
.answer-btn.wrong{background:rgba(255,107,107,0.1);border-color:#ff6b6b}
.answer-btn.eliminated{opacity:0.18;pointer-events:none}
.player-card{display:flex;border-radius:14px;overflow:hidden;border:2px solid rgba(255,215,0,0.3);background:#111;margin-bottom:14px}
.player-photo{width:115px;flex-shrink:0;object-fit:cover;object-position:top;height:155px}
.player-hints{flex:1;padding:9px;display:grid;grid-template-columns:1fr 1fr;gap:5px;align-content:start}
.hint-box{background:rgba(255,255,255,0.05);border-radius:7px;padding:5px 7px}
.hint-label{font-size:0.58rem;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;font-family:'Barlow Condensed',sans-serif}
.hint-val{font-size:0.8rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;line-height:1.2}
.feedback{padding:13px 15px;border-radius:12px;margin-bottom:13px}
.feedback.correct{background:rgba(0,212,170,0.09);border:1px solid rgba(0,212,170,0.3)}
.feedback.wrong{background:rgba(255,107,107,0.07);border:1px solid rgba(255,107,107,0.3)}
.feedback-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:0.04em;margin-bottom:5px}
.feedback.correct .feedback-title{color:#00d4aa}
.feedback.wrong .feedback-title{color:#ff6b6b}
.feedback-fact{font-size:0.82rem;color:#cbd5e1;line-height:1.45}
.new-card-badge{margin-top:9px;padding:6px 11px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:700}
.world-card{border-radius:16px;padding:18px;cursor:pointer;transition:all 0.2s;margin-bottom:12px;border:1px solid transparent}
.world-card:hover{transform:translateX(4px)}
.main-btn{font-family:'Bebas Neue',sans-serif;letter-spacing:0.06em;border-radius:10px;border:2px solid;padding:12px 26px;font-size:1rem;transition:all 0.15s}
.main-btn:hover{transform:scale(1.03)}
.world-icon{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 4px;cursor:pointer;text-align:center;transition:background 0.2s}
.world-icon:hover{background:rgba(255,255,255,0.1)}
.diff-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.06em;margin-bottom:12px}
/* Trophy Room */
.trophy-card{border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.trophy-card:hover{transform:translateY(-3px)}
.trophy-card.owned{background:linear-gradient(135deg,#1a1200,#3d2e00)}
.trophy-card.available{background:rgba(255,255,255,0.04)}
.trophy-card.locked{background:rgba(255,255,255,0.02);opacity:0.6}
.coin-badge{position:fixed;top:16px;right:16px;z-index:100;background:rgba(0,0,0,0.7);border:2px solid #ffd700;border-radius:20px;padding:6px 14px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#ffd700}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid #00d4aa;color:#00d4aa;padding:10px 20px;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:700;z-index:999;transition:opacity 0.5s;pointer-events:none}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active" style="align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden">
  <svg style="position:fixed;inset:0;width:100%;height:100%;opacity:0.05;pointer-events:none"><circle cx="50%" cy="50%" r="180" fill="none" stroke="#00d4aa" stroke-width="2"/><line x1="50%" y1="0" x2="50%" y2="100%" stroke="#00d4aa" stroke-width="1.5"/></svg>
  <div style="position:relative;z-index:1;text-align:center;max-width:520px;width:100%">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <button onclick="showScreen('trophy')" style="background:rgba(255,215,0,0.08);border:1px solid #ffd70044;color:#ffd700;padding:6px 12px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.82rem">🏆 TROPHY ROOM</button>
      <button onclick="toggleLang()" id="lang-btn" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#fff;padding:6px 12px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.82rem">🇷🇺 RU</button>
    </div>
    <div style="font-size:3.2rem;margin-bottom:4px">⚽</div>
    <h1 class="bebas" id="home-title" style="font-size:clamp(2.8rem,10vw,5rem);letter-spacing:0.04em;line-height:0.9;background:linear-gradient(135deg,#00d4aa 0%,#ffd700 50%,#ff6b6b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent">PETR'S</h1>
    <h2 class="bebas" id="home-subtitle" style="font-size:clamp(1.8rem,6vw,3rem);letter-spacing:0.08em;color:#ffd700;margin-bottom:6px">WORLD CUP QUIZ</h2>
    <p class="barlow" id="home-desc" style="color:#9ca3af;font-size:0.92rem;margin-bottom:6px">4 worlds · 90 questions · Collect trophies</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:6px">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;color:#ffd700">🪙 <span id="home-coins">0</span> coins</span>
      <span style="color:#374151">·</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;color:#9ca3af">🏆 <span id="home-trophies">0</span> trophies</span>
    </div>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:24px">
      <button class="main-btn" onclick="showScreen('worlds')" style="background:#00d4aa;color:#000;border-color:#00d4aa">⚽ <span id="btn-play">PLAY</span></button>
      <button class="main-btn" onclick="showScreen('trophy')" style="background:rgba(255,215,0,0.1);color:#ffd700;border-color:#ffd700">🏆 <span id="btn-trophy">TROPHIES</span></button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px" id="home-worlds"></div>
  </div>
</div>

<!-- WORLDS -->
<div id="screen-worlds" class="screen" style="padding:1.5rem 1rem">
  <div style="max-width:520px;margin:0 auto;width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <button onclick="showScreen('home')" style="background:none;border:none;color:#9ca3af;font-family:'Barlow Condensed',sans-serif;font-size:1rem">← <span id="back-worlds">Back</span></button>
      <button onclick="toggleLang()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#fff;padding:4px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.75rem" id="lang-btn-worlds">🇷🇺 RU</button>
    </div>
    <h2 class="bebas" id="worlds-title" style="font-size:2.4rem;letter-spacing:0.05em;color:#ffd700;margin-bottom:16px">CHOOSE YOUR WORLD</h2>
    <div id="worlds-list"></div>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen" style="padding:1.5rem 1rem">
  <div style="max-width:520px;margin:0 auto;width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button onclick="showScreen('worlds')" style="background:none;border:none;color:#9ca3af;font-family:'Barlow Condensed',sans-serif;font-size:0.9rem">← <span id="back-quiz">Worlds</span></button>
      <span class="bebas" style="font-size:1.1rem" id="quiz-world-title"></span>
      <button onclick="toggleLang()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#fff;padding:3px 8px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.7rem" id="lang-btn-quiz">🇷🇺 RU</button>
    </div>
    <div id="quiz-progress" style="display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap"></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:14px;font-family:'Barlow Condensed',sans-serif;font-size:0.85rem">
      <span style="color:#9ca3af" id="quiz-qnum"></span>
      <span id="quiz-score-row" style="display:flex;gap:10px">
        <span style="font-weight:700" id="quiz-score"></span>
        <span style="color:#ffd700">🪙 <span id="quiz-coins"></span></span>
      </span>
    </div>
    <div id="quiz-diff-badge" class="diff-badge"></div>
    <div id="quiz-question" style="font-family:'Barlow Condensed',sans-serif;font-size:clamp(0.95rem,3.2vw,1.2rem);font-weight:700;margin-bottom:16px;line-height:1.4;color:#f0f0f0"></div>
    <div id="quiz-media"></div>
    <div id="quiz-options"></div>
    <button id="ask-dad-btn" onclick="askDad()" style="width:100%;border-radius:8px;padding:7px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem;margin-bottom:12px;background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.33);color:#fbbf24"></button>
    <div id="quiz-feedback"></div>
    <button id="quiz-next-btn" onclick="nextQuestion()" style="display:none;width:100%;border:2px solid;border-radius:10px;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.06em;color:#000"></button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen" style="align-items:center;justify-content:center;padding:2rem 1rem">
  <div style="max-width:460px;width:100%;text-align:center">
    <h1 class="bebas" id="result-title" style="font-size:2.6rem;letter-spacing:0.06em;margin-bottom:4px"></h1>
    <div class="bebas" id="result-score" style="font-size:4.5rem;color:#fff;line-height:1"></div>
    <div class="barlow" id="result-sub" style="color:#9ca3af;margin-bottom:8px"></div>
    <div id="result-coins-earned" style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;color:#ffd700;margin-bottom:24px"></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="main-btn" onclick="replayWorld()" id="result-replay" style="width:100%"></button>
      <button class="main-btn" onclick="showScreen('trophy')" id="result-trophy" style="background:rgba(255,215,0,0.1);color:#ffd700;border-color:#ffd700;width:100%">🏆 TROPHY ROOM</button>
      <button class="main-btn" onclick="showScreen('home')" id="result-home" style="background:rgba(107,114,128,0.1);color:#9ca3af;border-color:#6b7280;width:100%">🏠 HOME</button>
    </div>
  </div>
</div>

<!-- TROPHY ROOM -->
<div id="screen-trophy" class="screen" style="padding:1.5rem 1rem">
  <div style="max-width:600px;margin:0 auto;width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <button onclick="showScreen('home')" style="background:none;border:none;color:#9ca3af;font-family:'Barlow Condensed',sans-serif;font-size:1rem">← <span id="back-trophy">Back</span></button>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1rem;color:#ffd700">🪙 <span id="trophy-coins"></span> coins available</div>
    </div>
    <h2 class="bebas" id="trophy-title" style="font-size:2.2rem;color:#ffd700;margin-bottom:4px">🏆 TROPHY ROOM</h2>
    <p class="barlow" id="trophy-sub" style="color:#9ca3af;margin-bottom:18px;font-size:0.85rem">Answer correctly to earn coins. Spend coins to buy trophies!</p>
    <div id="trophy-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px"></div>
  </div>
</div>

<div id="toast" class="toast" style="opacity:0"></div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "en";
let currentWorld = null;
let qIdx = 0;
let score = 0;
let roundCoins = 0;
let selected = false;
let dadUsed = false;
let shuffledOpts = []; // current question's shuffled options

function loadState() {
  try {
    return JSON.parse(localStorage.getItem("petr-state-v3") || "{}");
  } catch { return {}; }
}
function saveState(state) {
  try { localStorage.setItem("petr-state-v3", JSON.stringify(state)); } catch {}
}

function getCoins()    { return loadState().coins    || 0; }
function getTrophies() { return loadState().trophies || []; }
function addCoins(n)   { const s=loadState(); s.coins=(s.coins||0)+n; saveState(s); }
function buyTrophy(id) { const s=loadState(); s.coins=(s.coins||0)-TROPHIES.find(t=>t.id===id).cost; s.trophies=[...(s.trophies||[]),id]; saveState(s); }

const TOTAL_Q = WORLDS.reduce((s,w)=>s+w.questions.length,0);
function t(en,ru) { return lang==="ru" ? ru : en; }

// ── ANSWER RANDOMIZATION ──────────────────────────────────────────────────────
function shuffleOpts(opts) {
  const arr = opts.map((o,i)=>({...o, origIdx:i}));
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.opacity = "1";
  setTimeout(()=>el.style.opacity="0", 2200);
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+name).classList.add("active");
  if (name==="home")    renderHome();
  if (name==="worlds")  renderWorlds();
  if (name==="trophy")  renderTrophy();
}
function toggleLang() {
  lang = lang==="en"?"ru":"en";
  document.querySelectorAll("[id^='lang-btn']").forEach(b=>b.textContent=lang==="en"?"🇷🇺 RU":"🇬🇧 EN");
  const active=document.querySelector(".screen.active");
  if(active){const id=active.id.replace("screen-","");
    if(id==="home")renderHome();
    else if(id==="worlds")renderWorlds();
    else if(id==="quiz")renderQuestion();
    else if(id==="trophy")renderTrophy();
  }
}

// ── QUIZ ──────────────────────────────────────────────────────────────────────
function startWorld(id) {
  currentWorld=WORLDS.find(w=>w.id===id);
  qIdx=0;score=0;roundCoins=0;selected=false;dadUsed=false;
  showScreen("quiz");
  renderQuestion();
}

function renderQuestion() {
  if(!currentWorld)return;
  const w=currentWorld, q=w.questions[qIdx];
  document.getElementById("screen-quiz").style.background=w.bg;
  document.getElementById("quiz-world-title").textContent=`${w.emoji} ${t(w.name,w.nameRu)}`;
  document.getElementById("quiz-world-title").style.color=w.color;
  document.getElementById("back-quiz").textContent=t("Worlds","Миры");

  // Progress dots
  document.getElementById("quiz-progress").innerHTML=w.questions.map((_,i)=>
    `<div style="flex:1;height:4px;border-radius:2px;background:${i<qIdx?w.color:i===qIdx?w.color+'66':'rgba(255,255,255,0.08)'}"></div>`
  ).join("");

  document.getElementById("quiz-qnum").textContent=t(`Q${qIdx+1} of ${w.questions.length}`,`В${qIdx+1} из ${w.questions.length}`);
  document.getElementById("quiz-score").textContent=`⚽ ${score}`;
  document.getElementById("quiz-score").style.color=w.color;
  document.getElementById("quiz-coins").textContent=getCoins();

  const db=document.getElementById("quiz-diff-badge");
  db.textContent=t(q.diff.toUpperCase(), {easy:"ЛЁГКИЙ",medium:"СРЕДНИЙ",hard:"СЛОЖНЫЙ"}[q.diff]);
  db.style.cssText=`display:inline-block;padding:2px 9px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.06em;margin-bottom:12px;background:${DC[q.diff]}15;border:1px solid ${DC[q.diff]}44;color:${DC[q.diff]}`;

  document.getElementById("quiz-question").textContent=t(q.en,q.ru);

  // Media (player photo or flag)
  const media=document.getElementById("quiz-media");
  if(q.type==="player"){
    const photo=PLAYER_URLS[q.playerKey]||"";
    const hints=Object.entries(q.hint||{}).map(([k,v])=>`
      <div class="hint-box"><div class="hint-label">${k}</div><div class="hint-val">${v}</div></div>`).join("");
    media.innerHTML=`<div class="player-card" style="border-color:${w.color}44">
      <img src="${photo}" class="player-photo" alt="" onerror="this.style.display='none'"/>
      <div class="player-hints">${hints}</div>
    </div>`;
  } else if(q.type==="flag"){
    media.innerHTML=`<div style="text-align:center;margin-bottom:14px;background:rgba(255,255,255,0.05);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,0.1)">
      <img src="${flagUrl(q.flagCode)}" style="width:190px;height:127px;object-fit:cover;border-radius:8px;border:2px solid rgba(255,255,255,0.2)" alt="flag" onerror="this.parentElement.innerHTML='<span style=\\'font-size:4rem\\'>🏳️</span>'"/>
    </div>`;
  } else {
    media.innerHTML="";
  }

  // Shuffle options — ANSWER RANDOMIZATION
  shuffledOpts = shuffleOpts(q.opts);

  // Render options
  const optsEl=document.getElementById("quiz-options");
  if(q.type==="crest"){
    optsEl.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px";
    optsEl.innerHTML=shuffledOpts.map((o,i)=>{
      const imgSrc=BADGE_URLS[o.key]||"";
      return `<div class="crest-card" id="opt-${i}" onclick="pickAnswer(${i})" style="border-color:${w.color}33">
        <img src="${imgSrc}" class="crest-img" alt="${o.label}" onerror="this.parentElement.innerHTML='<span style=\\'font-size:2rem;padding:15px;display:block\\'>🛡️</span>'"/>
        <div class="barlow" style="font-size:0.75rem;font-weight:700;text-align:center">${o.label}</div>
      </div>`;
    }).join("");
  } else {
    optsEl.style.cssText="display:flex;flex-direction:column;gap:7px;margin-bottom:14px";
    optsEl.innerHTML=shuffledOpts.map((o,i)=>`
      <button class="answer-btn" id="opt-${i}" onclick="pickAnswer(${i})" style="border-color:${w.color}33">
        ${t(o.en||o.label, o.ru||o.label)}
      </button>`).join("");
  }

  // Ask Dad
  const dad=document.getElementById("ask-dad-btn");
  dad.style.display="block";
  dad.disabled=dadUsed;
  dad.style.opacity=dadUsed?"0.5":"1";
  dad.textContent=dadUsed?t("✅ Ask Dad used","✅ Помощь папы использована"):t("🆘 Ask Dad — removes 2 wrong answers","🆘 Спроси папу — убрать 2 неверных ответа");

  document.getElementById("quiz-feedback").innerHTML="";
  const nb=document.getElementById("quiz-next-btn");
  nb.style.display="none";
  nb.style.background=w.color;
  nb.style.borderColor=w.color;
  selected=false;
}

function pickAnswer(idx) {
  if(selected)return;
  selected=true;
  const w=currentWorld, q=w.questions[qIdx];
  const chosenOpt=shuffledOpts[idx];
  const isCorrect=chosenOpt.correct;

  // Highlight all options
  shuffledOpts.forEach((o,i)=>{
    const el=document.getElementById("opt-"+i);
    if(!el)return;
    if(o.correct)el.classList.add("correct");
    else if(i===idx&&!o.correct)el.classList.add("wrong");
    el.onclick=null;
  });

  let coinsEarned=0;
  if(isCorrect){
    score++;
    coinsEarned=q.coin||COIN_REWARD[q.diff]||3;
    roundCoins+=coinsEarned;
    addCoins(coinsEarned);
    document.getElementById("quiz-coins").textContent=getCoins();
  }

  const feedbackHtml=`
    <div class="feedback ${isCorrect?"correct":"wrong"}">
      <div class="feedback-title">${isCorrect?t("⚽ CORRECT!","⚽ ПРАВИЛЬНО!")+` +${coinsEarned} 🪙`:t("❌ WRONG!","❌ НЕВЕРНО!")}</div>
      <div class="feedback-fact">💡 ${t(q.fact,q.factRu)}</div>
    </div>`;
  document.getElementById("quiz-feedback").innerHTML=feedbackHtml;

  const nb=document.getElementById("quiz-next-btn");
  nb.style.display="block";
  nb.textContent=qIdx+1>=w.questions.length?t("🏆 SEE RESULTS","🏆 РЕЗУЛЬТАТЫ"):t("NEXT →","ДАЛЬШЕ →");
  document.getElementById("ask-dad-btn").style.display="none";
}

function askDad() {
  if(dadUsed||selected)return;
  dadUsed=true;
  const wrongs=shuffledOpts.map((o,i)=>o.correct?-1:i).filter(i=>i>=0);
  wrongs.sort(()=>Math.random()-.5).slice(0,2).forEach(i=>{
    const el=document.getElementById("opt-"+i);
    if(el){el.classList.add("eliminated");el.onclick=null;}
  });
  const btn=document.getElementById("ask-dad-btn");
  btn.textContent=t("✅ Ask Dad used","✅ Помощь папы использована");
  btn.disabled=true;btn.style.opacity="0.5";
}

function nextQuestion() {
  qIdx++;
  if(qIdx>=currentWorld.questions.length)showResult();
  else renderQuestion();
}

// ── RESULT ────────────────────────────────────────────────────────────────────
function showResult() {
  const w=currentWorld, total=w.questions.length, pct=Math.round((score/total)*100);
  const g=pct>=80?{en:"CHAMPION! 🏆",ru:"ЧЕМПИОН! 🏆",c:"#ffd700"}
         :pct>=60?{en:"GREAT GAME! ⭐",ru:"ОТЛИЧНАЯ ИГРА! ⭐",c:"#00d4aa"}
         :{en:"KEEP TRAINING! 💪",ru:"ТРЕНИРУЙСЯ! 💪",c:"#ff6b6b"};
  document.getElementById("screen-result").style.background=w.bg;
  document.getElementById("result-title").textContent=t(g.en,g.ru);
  document.getElementById("result-title").style.color=g.c;
  document.getElementById("result-score").innerHTML=`${score}<span style="color:${w.color}">/${total}</span>`;
  document.getElementById("result-sub").textContent=`${t(w.name,w.nameRu)} · ${pct}%`;
  document.getElementById("result-coins-earned").textContent=`🪙 +${roundCoins} coins earned! Total: ${getCoins()}`;
  const rb=document.getElementById("result-replay");
  rb.textContent=t("🔄 PLAY AGAIN","🔄 СНОВА");
  rb.style.background=w.color;rb.style.borderColor=w.color;
  showScreen("result");
  document.getElementById("screen-result").style.display="flex";
}
function replayWorld(){startWorld(currentWorld.id);}

// ── TROPHY ROOM ───────────────────────────────────────────────────────────────
function renderTrophy() {
  document.getElementById("back-trophy").textContent=t("Back","Назад");
  document.getElementById("trophy-title").textContent=t("🏆 TROPHY ROOM","🏆 КОМНАТА ТРОФЕЕВ");
  document.getElementById("trophy-sub").textContent=t("Answer correctly to earn coins. Spend coins to buy trophies!","Отвечай правильно — зарабатывай монеты. Трать монеты на трофеи!");
  const coins=getCoins(), owned=getTrophies();
  document.getElementById("trophy-coins").textContent=coins;

  const grid=document.getElementById("trophy-grid");
  grid.innerHTML=TROPHIES.map(tr=>{
    const isOwned=owned.includes(tr.id);
    const canAfford=coins>=tr.cost&&!isOwned;
    const cls=isOwned?"owned":canAfford?"available":"locked";
    return `<div class="trophy-card ${cls}" style="border:2px solid ${isOwned?tr.color:'rgba(255,255,255,0.08)'};${isOwned?`box-shadow:0 0 20px ${tr.color}44`:''}"
      onclick="${canAfford?`purchaseTrophy('${tr.id}')`:isOwned?"showToast('"+t("Already owned!","Уже есть!")+"')":"showToast('"+t(`Need ${tr.cost} coins!`,`Нужно ${tr.cost} монет!`)+"')"}"  >
      <div style="font-size:2.2rem;margin-bottom:6px;${isOwned?'filter:drop-shadow(0 0 8px '+tr.color+'88)':''}">${tr.emoji}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.82rem;color:${isOwned?tr.color:'#e5e7eb'};line-height:1.3;margin-bottom:6px">${t(tr.name,tr.nameRu||tr.name)}</div>
      ${isOwned
        ?`<div style="color:${tr.color};font-family:'Bebas Neue',sans-serif;font-size:0.9rem">✓ OWNED</div>`
        :`<div style="font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:700;color:${canAfford?'#ffd700':'#6b7280'}">🪙 ${tr.cost}</div>`
      }
    </div>`;
  }).join("");
}

function purchaseTrophy(id) {
  const tr=TROPHIES.find(t=>t.id===id);
  const coins=getCoins();
  if(coins<tr.cost)return showToast(t(`Need ${tr.cost} coins!`,`Нужно ${tr.cost} монет!`));
  buyTrophy(id);
  showToast(t(`🏆 ${tr.name} added to your trophy room!`,`🏆 ${tr.nameRu||tr.name} добавлен в комнату трофеев!`));
  renderTrophy();
  document.getElementById("home-coins")&&(document.getElementById("home-coins").textContent=getCoins());
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHome();
</script>
